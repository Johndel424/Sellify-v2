            function checkChangesBeforeLogout() {
                Swal.fire({

                    showDenyButton: true,

                    confirmButtonText: "Yes",
                    denyButtonText: "No"
                }).then((result) => {

<script>
    const allSideMenu = document.querySelectorAll('#sidebar .side-menu.top li a');

    allSideMenu.forEach(item=> {
        const li = item.parentElement;

        item.addEventListener('click', function () {
            allSideMenu.forEach(i=> {
                i.parentElement.classList.remove('active');
            })
            li.classList.add('active');
        })
    });




    // TOGGLE SIDEBAR
    const menuBar = document.querySelector('#content nav .bx.bx-menu');
    const sidebar = document.getElementById('sidebar');

    menuBar.addEventListener('click', function () {
        sidebar.classList.toggle('hide');
    })



    const searchButton = document.querySelector('#content nav form .form-input button');
    const searchButtonIcon = document.querySelector('#content nav form .form-input button .bx');
    const searchForm = document.querySelector('#content nav form');

    searchButton.addEventListener('click', function (e) {
        if(window.innerWidth < 576) {
            e.preventDefault();
            searchForm.classList.toggle('show');
            if(searchForm.classList.contains('show')) {
                searchButtonIcon.classList.replace('bx-search', 'bx-x');
            } else {
                searchButtonIcon.classList.replace('bx-x', 'bx-search');
            }
        }
    })





    if(window.innerWidth < 768) {
        sidebar.classList.add('hide');
    } else if(window.innerWidth > 576) {
        searchButtonIcon.classList.replace('bx-x', 'bx-search');
        searchForm.classList.remove('show');
    }


    window.addEventListener('resize', function () {
        if(this.innerWidth > 576) {
            searchButtonIcon.classList.replace('bx-x', 'bx-search');
            searchForm.classList.remove('show');
        }
    })



    const switchMode = document.getElementById('switch-mode');

    switchMode.addEventListener('change', function () {
        if(this.checked) {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    })

	function filterItems(category) {
        const itemsContainer = document.getElementById('itemsContainer');
        const itemsRef = firebase.database().ref('Items');
        let foundItems = false; // Flag to track if any items are found

        itemsRef.on('value', function(snapshot) {
            itemsContainer.innerHTML = ''; // Clear previous items

            snapshot.forEach(function(childSnapshot) {
                var item = childSnapshot.val();
                if (item.category === category) { // Filter items by category
                    var itemHtml = `
                        <div class="item" style="border: 1px solid #ccc; box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1); border-radius: 5px;">
                            <div class="mainImg" style="text-align: center; margin: 0 auto; width: 100%;">
                                <img src='${item.dataImage}'>
                                <span class="text">
                                    <p>${item.category}</p>
                                    <p>${item.dataTitle}</p>
                                    <h3>${item.dataLang}</h3>
                                    <div class="left" style="float: left;">
                                        <div class="circle-pic" style="display: inline-block; height: 50px; width: 50px;">
                                            <img src="${item.profile}" alt="">
                                        </div>
                                        <p style="display: inline-block; vertical-align: top;">${item.username}</p>
                                    </div>
                                </span>
                            </div>
                        </div>
                    `;
                    itemsContainer.innerHTML += itemHtml;
                    foundItems = true; // Set flag to true if item is found
                }
            });

             // If no items found, display message with image
			 if (!foundItems) {
                const noItemsHtml = `
                    <div class="no-items" style="text-align: center;">
                        <img src="img/noitem.png" alt="No items found" style="height: 200px; width: 200px;">
                        <p>No items found for category: ${category}</p>
                    </div>
                `;
                itemsContainer.innerHTML = noItemsHtml;
            }
        });
    }
</script>

    firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    // User is signed in, get the user ID
    var uid = user.uid;
    
    // Reference to the user's profile in the database
    var userProfileRef = firebase.database().ref('users/' + uid);

    // Get the profile data from the database
    userProfileRef.once('value').then(function(snapshot) {
      var profileData = snapshot.val(); // Makuha ang lahat ng data ng profile
      
      // Get the profile image URL
      var profileImgUrl = profileData.profileImg;

      // Get the username
      var username = profileData.username;

      // Set the profile image src attribute
      if (profileImgUrl) { 
        document.getElementById('userProfileImage').src = profileImgUrl;
      }

      // Set the username inside the div
      if (username) {
        document.getElementById('usernameParagraph').innerText = username;
      }
    }).catch(function(error) {
      console.log("Error fetching user data:", error);
    });
  } else {
    // No user is signed in.
    console.log("No user is signed in.");
  }
});

    function logoutUser() {
        firebase.auth().signOut().then(() => {
            // Sign-out successful.
            //alert("User logged out successfully!");
            window.location = 'index.html'; // Redirect to login page after logout
        }).catch((error) => {
            // An error happened.
            console.error("Logout Error:", error);
            alert("Error logging out!");
        });
    }
