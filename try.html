<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilog na Input Type na Image</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <form action="#">
    <label for="profilePic">
      <div class="circle">
        <img id="profilePicPreview" src="img/avatar.svg" alt="Profile Picture">
      </div>
      <input type="file" id="profilePic" accept="image/*" onchange="previewImage();">
    </label>
  </form>
  <script>
    function previewImage() {
      var reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('profilePicPreview').src = e.target.result;
      }
      reader.readAsDataURL(document.getElementById('profilePic').files[0]);
    }
  </script>
  <style>
    .circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
    }

    .circle img {
      width: 100%;
      height: auto;
      display: block;
    }

    input[type="file"] {
      display: none;
    }

    input[type="file"] + label {
      cursor: pointer;
    }
  </style>
</body>
</html>
